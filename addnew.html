<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artist Finder</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/addnew.css">
    <link rel="stylesheet" href="css/colors-fonts.css">
</head>

<body>
    <div class="layout">
        <div class="header">
            <div class="logo"></div>
            <h1>ArtistFinder</h1>
        </div>
        <div class="menu">
            <div class="menuItemGroup">
                <a href="index.html">
                    <div class="menuItem">
                        Home
                    </div>
                </a>
                <a href="artists.html">
                    <div class="menuItem">
                        Artists
                    </div>
                </a>
                <a href="addnew.html">
                    <div class="menuItem activeMenuItem">
                        Add new
                    </div>
                </a>
            </div>
        </div>
        <div class="content">
            <div class="addNewContainer rounded1 bordered">
                <div class="subHeader">
                    <h2>Add new artist</h2>
                </div>
                <form>
                    <input class="addNewEntry valueInput rounded2" id="name" placeholder="Name"
                    type="text" required>

                    <select class="addNewEntry valueInput rounded2" id="genre" required>
                        <option value="" disabled selected>Genre</option>
                    </select>

                    <select class="addNewEntry valueInput rounded2" id="year" required>
                        <option value="" disabled selected>Year</option>
                    </select>

                    <input type="submit" class="button rounded2">
                </form>
                <span id="submitStatusText"></span>
                <div style="height: 2rem"></div>
            </div>
        </div>
        <div class="footer">© Anders Hedström</footer>
    </div>
    <script src="./js/addnew.js" type="module"></script>
</body>

</html>
