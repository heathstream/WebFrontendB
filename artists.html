<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artist Finder</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/artists.css">
    <link rel="stylesheet" href="css/colors-fonts.css">
</head>

<body>
    <div class="layout">
        <div class="header">
            <div class="logo"></div>
            <h1>ArtistFinder</h1>
        </div>
        <div class="menu">
            <div class="menuItemGroup">
                <a href="index.html">
                    <div class="menuItem">
                        Home
                    </div>
                </a>
                <a href="artists.html">
                    <div class="menuItem activeMenuItem">
                        Artists
                    </div>
                </a>
                <a href="addnew.html">
                    <div class="menuItem ">
                        Add new
                    </div>
                </a>
            </div>
        </div>
        <div class="content">
            <div class="artistsContainer rounded1 bordered">
                <div class="subHeader">
                    <h2>Artists</h2>
                    <div class="browseButtonGroup">
                        <button id="buttonPrev" class="button rounded2">&lt;</button>
                        <button id="buttonNext" class="button rounded2">&gt;</button>
                    </div>
                    <span id="paginatorText">X - X of X</span>
                    <div class="searchBoxGroup">
                        <input id="searchBox" class="rounded2" placeholder="Led Zeppelin">
                        <button id="buttonSearch" class="button rounded2">Search</button>
                    </div>
                </div>
                <div class="artistsTable">
                    <div class="artistsTableRow tableRowTitle">
                        <div class="tableCellTitle artistName">Name</div>
                        <div class="tableCellTitle artistGenre">Genre</div>
                        <div class="tableCellTitle artistYear">Year</div>
                        <div class="tableCellTitle artistAlbums">Albums</div>
                    </div>
                    
                    <div class="artistsTableLoader"><p>Loading...</p></div>
                    <div id="tableBottom" style="height: 2rem;"></div>
                </div>
            </div>
        </div>
        <div class="footer">(c) Anders Hedström</footer>
        </div>
        <script src="./js/artists.js" type="module"></script>
        <script src="./js/api-service.js" type="module"></script>
</body>

</html>
